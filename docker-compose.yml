# Cloud Nexus - Docker Compose
# Production-friendly layout; use .env for secrets.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudnexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-cloudnexus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudnexus} -d ${POSTGRES_DB:-cloudnexus}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nexus

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - nexus

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cloudnexus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cloudnexus}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "8000:8000"
    networks:
      - nexus

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - nexus

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cloudnexus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cloudnexus}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus

  automation-runner:
    build:
      context: ./services/automation-runner
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - api
      - redis
    networks:
      - nexus

volumes:
  postgres_data:
  redis_data:

networks:
  nexus:
    driver: bridge
